name: Import SoS Candidate Data

on:
  schedule:
    - cron: '0 8 * * 1'    # Every Monday at 8am UTC (midnight Pacific) — runs importers
    - cron: '0 14 * * 1-5' # Every M–F at 14:00 UTC (7am PDT / 6am PST) — runs digest
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

jobs:
  import-fec-house:
    name: FEC House (all 50 states)
    runs-on: ubuntu-latest
    steps:
      - name: Import FEC House in page chunks
        run: |
          for start_page in 1 9 17 25 33 41; do
            echo "--- House pages $start_page–$((start_page+7)) ---"
            body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -d "{\"office\":\"H\",\"startPage\":$start_page,\"maxPages\":8}" \
              https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/import-fec)
            status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
            content=$(echo "$body" | sed '/HTTP_STATUS:/d')
            echo "Status: $status | $content"
            if [ "$status" != "200" ]; then exit 1; fi
            count=$(echo "$content" | grep -o '"count":[0-9]*' | cut -d: -f2)
            if [ "${count:-0}" = "0" ]; then echo "No more House pages."; break; fi
          done

  import-fec-senate:
    name: FEC Senate (all 50 states)
    runs-on: ubuntu-latest
    needs: import-fec-house
    steps:
      - name: Import FEC Senate in page chunks
        run: |
          for start_page in 1 9 17; do
            echo "--- Senate pages $start_page–$((start_page+7)) ---"
            body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -d "{\"office\":\"S\",\"startPage\":$start_page,\"maxPages\":8}" \
              https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/import-fec)
            status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
            content=$(echo "$body" | sed '/HTTP_STATUS:/d')
            echo "Status: $status | $content"
            if [ "$status" != "200" ]; then exit 1; fi
            count=$(echo "$content" | grep -o '"count":[0-9]*' | cut -d: -f2)
            if [ "${count:-0}" = "0" ]; then echo "No more Senate pages."; break; fi
          done

  import-california:
    name: California CAL-ACCESS
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CA importer
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/import-california)
          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          content=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "CA importer status: $status"
          echo "CA importer response: $content"
          if [ "$status" != "200" ]; then
            exit 1
          fi

  import-washington:
    name: Washington State PDC
    runs-on: ubuntu-latest
    steps:
      - name: Trigger WA importer
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/import-washington)
          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          content=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "WA importer status: $status"
          echo "WA importer response: $content"
          if [ "$status" != "200" ]; then
            exit 1
          fi

  import-north-carolina:
    name: North Carolina NCSBE
    runs-on: ubuntu-latest
    steps:
      - name: Trigger NC importer
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/import-north-carolina)
          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          content=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "NC importer status: $status"
          echo "NC importer response: $content"
          if [ "$status" != "200" ]; then
            exit 1
          fi

  import-florida:
    name: Florida Division of Elections
    runs-on: ubuntu-latest
    # Florida qualifying opens in June — skip until then
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(fromJson('["06","07","08","09","10","11"]'), format('{0}', github.event.schedule)) ) }}
    steps:
      - name: Trigger FL importer
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/import-florida)
          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          content=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "FL importer status: $status"
          echo "FL importer response: $content"
          if [ "$status" != "200" ]; then
            exit 1
          fi

  import-alaska:
    name: Alaska APOC
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AK importer
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/import-alaska)
          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          content=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "AK importer status: $status"
          echo "AK importer response: $content"
          if [ "$status" != "200" ]; then
            exit 1
          fi

  import-virginia:
    name: Virginia ELECT
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VA importer
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/import-virginia)
          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          content=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "VA importer status: $status"
          echo "VA importer response: $content"
          if [ "$status" != "200" ]; then
            exit 1
          fi

  daily-filings-digest:
    name: Daily Filings Digest Email
    runs-on: ubuntu-latest
    # Only run on the 14:00 UTC digest schedule (not the Monday importer schedule)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 14 * * 1-5' }}
    steps:
      - name: Send digest email
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            https://pmiqbxxvoabowwiedrej.supabase.co/functions/v1/daily-filings-digest)
          status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          content=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "Digest status: $status"
          echo "Digest response: $content"
          if [ "$status" != "200" ]; then
            exit 1
          fi
