<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 52" fill="none" overflow="visible">
  <!--
    Decide to Run — Wordmark (Blue on transparent)
    DECIDE bold, to light, RUN bold. Tight tracking.
    Use on white or light backgrounds.
  -->
  <text
    y="40"
    font-family="proxima-nova, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="40"
    letter-spacing="3"
  >
    <tspan font-weight="700" fill="#004AAD">DECIDE</tspan>
    <tspan font-weight="300" fill="#004AAD" opacity="0.7"> TO </tspan>
    <tspan font-weight="700" fill="#004AAD">RUN</tspan>
  </text>
</svg>
