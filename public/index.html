<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1F1F1F" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Barlow Condensed kept only for the Decide to Run logo wordmark -->
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet" />
    <!-- Proxima Nova via Adobe Fonts -->
    <link rel="stylesheet" href="https://use.typekit.net/fuu6thf.css" />
    <style>
      /* CrowdBlue design system — global typography & color base */
      :root {
        --white:       #FDFDFD;
        --neutral-0:   #EBEBEB;
        --neutral-1:   #DADADA;
        --neutral-2:   #808080;
        --black:       #1F1F1F;
        --primary:     #004AAD;
        --primary-1:   #ADC6E8;
        --primary-2:   #5688CA;
        --primary-3:   #012A60;
        --secondary:   #D83C13;
        --secondary-1: #F9CABD;
        --secondary-2: #F17E5F;
        --secondary-3: #4B1506;
        --success:     #1FAD26;
        --success-1:   #BEF4C1;
        --success-2:   #7DE882;
        --success-3:   #0F5713;
        --error:       #D41313;
        --error-1:     #F4BEBE;
        --error-2:     #E87D7D;
        --error-3:     #570F0F;
        --warning:     #C9C00C;
        --warning-1:   #F8F7D3;
        --warning-2:   #F0EC9A;
        --warning-3:   #8B6F09;
        --sans-font:   'proxima-nova', Helvetica, Arial, sans-serif;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: var(--sans-font);
        color: var(--black);
        background-color: var(--white);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    
    <!-- Primary Meta Tags -->
    <title>Decide to Run - Find Elected Offices to Run For | Real FEC Data</title>
    <meta name="title" content="Decide to Run - Find Elected Offices to Run For | Real FEC Data" />
    <meta name="description" content="Discover what offices you can run for in your area. See who's already running, campaign costs, filing deadlines, and get a personalized campaign plan. Covers all 50 states with verified FEC data." />
    <meta name="keywords" content="run for office, campaign, election, congress, house of representatives, local office, political campaign, FEC data, filing deadline, campaign costs" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.decidetorun.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.decidetorun.com/" />
    <meta property="og:title" content="Decide to Run - Find Elected Offices to Run For" />
    <meta property="og:description" content="Discover what offices you can run for in your area. See who's already running, campaign costs, and filing deadlines. Real FEC data for all 50 states." />
    <meta property="og:image" content="https://www.decidetorun.com/og-image.png" />
    <meta property="og:site_name" content="Decide to Run" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.decidetorun.com/" />
    <meta property="twitter:title" content="Decide to Run - Find Elected Offices to Run For" />
    <meta property="twitter:description" content="Discover what offices you can run for in your area. See who's already running, campaign costs, and filing deadlines. Real FEC data for all 50 states." />
    <meta property="twitter:image" content="https://www.decidetorun.com/twitter-image.png" />
    
    <!-- Author & Copyright -->
    <meta name="author" content="Decide to Run" />
    <meta name="copyright" content="Decide to Run 2026" />
    
    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BSBGCCZVYJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BSBGCCZVYJ');
    </script>
    
    <!-- Structured Data for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Decide to Run",
      "description": "Platform to help people discover and run for elected office",
      "url": "https://www.decidetorun.com",
      "applicationCategory": "Political",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Find offices to run for",
        "View candidate lists",
        "Campaign cost estimates",
        "Filing deadlines",
        "Campaign planning tools"
      ]
    }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <!-- CrowdBlue network banner — static so it renders before React -->
    <div id="cb-network-bar" style="
      background: #ffffff;
      border-bottom: 2px solid #004AAD;
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 28px;
      font-family: 'Libre Franklin', 'Franklin Gothic Medium', Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      position: relative;
      z-index: 9999;
    ">
      <!-- Brand wordmark -->
      <a href="https://crowdblue.com/feed" style="
        font-weight: 800;
        color: #1F1F1F;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      ">CrowdBlue</a>

      <!-- Product links -->
      <a href="https://decidetorun.com/" style="
        font-weight: 600;
        color: #004AAD;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-bottom: 1.5px solid #004AAD;
        padding-bottom: 1px;
      ">Decide to Run</a>

      <a href="https://campaigns.crowdblue.com/" style="
        font-weight: 600;
        color: #004AAD;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      " onmouseover="this.style.borderBottom='1.5px solid #004AAD'; this.style.paddingBottom='1px';"
         onmouseout="this.style.borderBottom='none'; this.style.paddingBottom='0';">Campaign HQ</a>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
